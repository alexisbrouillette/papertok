services:
  - type: web
    name: papertok
    env: node
    plan: free
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source && npm run build
    startCommand: npm start
    disk:
      name: papertok-db-disk
      mountPath: /opt/render/project/src/database
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_PATH
        value: /opt/render/project/src/database/papertok.db
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
